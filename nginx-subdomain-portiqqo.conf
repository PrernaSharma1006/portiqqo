# Wildcard subdomain configuration for portfolios (*.portiqqo.me)
# Note: upstream backend_api is defined in the main portiqqo.conf

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name *.portiqqo.me;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/portiqqo/frontend/dist;
        allow all;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Wildcard subdomain for portfolios (*.portiqqo.me)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.portiqqo.me;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/portiqqo.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portiqqo.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/portiqqo/frontend/dist;
    index index.html;

    # Logging
    access_log /var/log/nginx/portfolio-subdomain-access.log;
    error_log /var/log/nginx/portfolio-subdomain-error.log warn;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss;

    # Client body size limit
    client_max_body_size 50M;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/portiqqo/frontend/dist;
        allow all;
    }

    # API Proxy
    location /api {
        proxy_pass http://backend_api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Frontend – React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* .(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* .(css|js|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Robots
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
